<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Quiz | AIML Lab</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a10 10 0 1 0 10 10H12V2Z"/><path d="M12 12L2.1 12"/><path d="M12 12L19.07 4.93"/>
                </svg>
            </div>
            <span>AIML Lab</span>
        </a>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="learn.html">Learn</a>
            <a href="mcq.html" style="color: var(--text-main);">Quiz</a>
            <a href="play.html">Play</a>
            <a href="simulate.html">Simulate</a>
            <a href="contact.html">Contact</a>
            <div class="nav-auth">
                <a href="login.html" class="btn btn-outline">Login</a>
                <a href="signup.html" class="btn btn-primary">Sign Up</a>
            </div>
        </div>

        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="page-header">
        <h1>MCQ Assessment</h1>
        <p>Test your knowledge of Machine Learning fundamentals.</p>
    </div>

    <div class="content-section">
        <div id="quiz-area" class="quiz-container">
            <div class="card">
                <div id="question-container">
                    <p class="question-text" id="question">Loading question...</p>
                    <div class="options-grid" id="options">
                        <!-- Options will be injected here -->
                    </div>
                </div>
                
                <div class="quiz-footer">
                    <span class="progress-text" id="progress">Question 1 of 7</span>
                    <button class="btn btn-primary" id="next-btn" disabled>Next Question</button>
                </div>
            </div>
        </div>

        <div id="result-area" class="quiz-container" style="display: none;">
            <div class="card result-card">
                <h2>Quiz Completed!</h2>
                <div class="result-score" id="score-display">0/7</div>
                <p class="result-message" id="result-message">Great effort!</p>
                <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
                    <button class="btn btn-primary" onclick="location.reload()">Restart Quiz</button>
                    <a href="dashboard.html" class="btn btn-outline">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
