<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Practice | AIML Lab</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            text-align: left;
            margin-top: 2rem;
        }
        .code-editor {
            width: 100%;
            height: 300px;
            background: #1e1e3f;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            color: #d1d5db;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            resize: none;
            outline: none;
        }
        .code-editor:focus {
            border-color: var(--accent-primary);
        }
        .output-box {
            background: #050510;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            height: 300px;
            font-family: monospace;
            overflow-y: auto;
        }
        @media (max-width: 900px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a10 10 0 1 0 10 10H12V2Z"/><path d="M12 12L2.1 12"/><path d="M12 12L19.07 4.93"/>
                </svg>
            </div>
            <span>AIML Lab</span>
        </a>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="learn.html">Learn</a>
            <a href="quiz.html" style="color: var(--text-main);">Quiz</a>
            <a href="play.html">Play</a>
            <a href="simulate.html">Simulate</a>
            <a href="contact.html">Contact</a>
            <div class="nav-auth">
                <a href="login.html" class="btn btn-outline">Login</a>
                <a href="signup.html" class="btn btn-primary">Sign Up</a>
            </div>
        </div>

        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="page-header">
        <h1>Coding Practice</h1>
        <p>Apply your skills by solving interactive coding problems.</p>
    </div>

    <div class="content-section">
        <div class="card" style="text-align: left;">
            <h2 style="color: var(--accent-primary);">Problem: Hello World</h2>
            <p style="margin: 1rem 0; color: var(--text-muted);">Write a program that prints "Hello World" to the console.</p>
            
            <div style="margin-bottom: 1rem;">
                <label style="font-size: 0.9rem; color: var(--text-muted);">Language:</label>
                <select class="btn btn-outline" style="padding: 0.3rem 0.8rem; font-size: 0.8rem; margin-left: 0.5rem;">
                    <option>JavaScript</option>
                    <option>Python</option>
                </select>
            </div>

            <div class="editor-container">
                <textarea id="code-editor" class="code-editor" placeholder="// Write your code here..."></textarea>
                <div class="output-box" id="code-output">
                    <span style="color: var(--text-muted)">Output will appear here...</span>
                </div>
            </div>

            <div style="margin-top: 2rem; display: flex; justify-content: space-between; align-items: center;">
                <button class="btn btn-primary" id="run-code">Run Code</button>
                <a href="quiz.html" class="btn btn-outline">Back to Dashboard</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
