<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | AIML Lab</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a10 10 0 1 0 10 10H12V2Z"/><path d="M12 12L2.1 12"/><path d="M12 12L19.07 4.93"/>
                </svg>
            </div>
            <span>AIML Lab</span>
        </a>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="learn.html">Learn</a>
            <a href="mcq.html">Quiz</a>
            <a href="play.html">Play</a>
            <a href="simulate.html">Simulate</a>
            <a href="contact.html" style="color: var(--text-main);">Contact</a>
            <div class="nav-auth">
                <a href="login.html" class="btn btn-outline">Login</a>
                <a href="signup.html" class="btn btn-primary">Sign Up</a>
            </div>
        </div>

        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="page-header">
        <h1>Contact Us</h1>
        <p>Have questions or feedback? We'd love to hear from you.</p>
    </div>

    <div class="content-section">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem; text-align: left;">
            <!-- Contact Info -->
            <div class="contact-info">
                <div class="card" style="margin-bottom: 1.5rem;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <span style="font-size: 1.5rem;">📧</span>
                        <div>
                            <h4 style="color: var(--text-main);">Email</h4>
                            <p style="font-size: 0.9rem;">example@email.com</p>
                        </div>
                    </div>
                </div>
                <div class="card" style="margin-bottom: 1.5rem;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <span style="font-size: 1.5rem;">💻</span>
                        <div>
                            <h4 style="color: var(--text-main);">GitHub</h4>
                            <p style="font-size: 0.9rem;">github.com/yourusername</p>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <span style="font-size: 1.5rem;">📷</span>
                        <div>
                            <h4 style="color: var(--text-main);">Instagram</h4>
                            <p style="font-size: 0.9rem;">@yourusername</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="contact-form-wrapper">
                <form id="contactForm" class="auth-card" style="max-width: 100%; padding: 2rem;">
                    <div class="form-group">
                        <label for="contact-name">Name</label>
                        <input type="text" id="contact-name" placeholder="Your Name" required minlength="2">
                    </div>
                    <div class="form-group">
                        <label for="contact-email">Email</label>
                        <input type="email" id="contact-email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="contact-message">Message</label>
                        <textarea id="contact-message" rows="5" placeholder="How can we help?" required minlength="10" style="width: 100%; padding: 0.8rem 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: white; font-size: 1rem; transition: all 0.3s ease; resize: vertical;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary auth-btn">Send Message</button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
